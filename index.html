<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Scrapbook</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #d2b48c; /* Warna cokelat kertas kraft */
            background-image: url('bg-kraft.jpg'); /* Opsional: gambar tekstur kertas */
            background-size: cover;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Container Buku */
        #album {
            width: 350px; /* Ukuran pas untuk layar HP */
            height: 500px;
        }

        .page {
            width: 350px;
            height: 500px;
            background-color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Tombol Navigasi Bawah */
        .controls {
            position: fixed;
            bottom: 30px;
            display: flex;
            gap: 20px;
            z-index: 100;
        }

        .btn {
            background-color: #7d5a50;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.3);
            font-size: 16px;
        }

        /* Overlay Popup Pesan */
        #msgPopup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff8f0;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            z-index: 200;
            width: 80%;
            max-width: 300px;
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 100px;
            margin: 10px 0;
            border: 1px solid #7d5a50;
            border-radius: 10px;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div id="album">
        <div class="hard"><img src="cover.jpg"></div>
        
        <div><img src="page1.png"></div>
        <div><img src="page2.png"></div>
        <div><img src="page3.png"></div>
        
        <div class="hard">
            <img src="last-page.png">
            <button class="btn" style="position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);" onclick="openPopup()">Kirim Pesan</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="$('#album').turn('previous')">←</button>
        <button class="btn" onclick="$('#album').turn('next')">→</button>
    </div>

    <div id="msgPopup">
        <h3>Tulis pesan untukku:</h3>
        <textarea id="pesanInput" placeholder="Halo sayang..."></textarea>
        <br>
        <button class="btn" onclick="kirimWA()">Kirim ke WhatsApp</button>
        <button class="btn" style="background: grey;" onclick="closePopup()">Batal</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://rawcdn.githack.com/blasten/turn.js/master/turn.min.js"></script>

    <script>
        $(document).ready(function() {
            // Inisialisasi efek buku
            $("#album").turn({
                width: 350,
                height: 500,
                autoCenter: true,
                duration: 1000 // Kecepatan membalik halaman
            });
        });

        function openPopup() {
            document.getElementById('msgPopup').style.display = 'block';
        }

        function closePopup() {
            document.getElementById('msgPopup').style.display = 'none';
        }

        function kirimWA() {
            const pesan = document.getElementById('pesanInput').value;
            if (pesan.trim() === "") {
                alert("Jangan dikosongin ya :)");
                return;
            }
            // Ganti nomor di bawah dengan nomormu sendiri
            const noWA = "6283114532706"; 
            const url = `https://wa.me/${noWA}?text=${encodeURIComponent(pesan)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
