<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scrapbook Untukmu</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #e3dcd1;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        
        #book-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        #album {
            width: 700px;
            height: 500px;
        }

        .page {
            background-color: white;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        
        .controls {
            position: fixed;
            bottom: 20px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .btn {
            background-color: #333; 
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.3);
            font-size: 16px;
            font-family: 'Quicksand', sans-serif;
            font-weight: bold;
        }

      
        .last-page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAIAAAACCAYAAABytg0kAAAAGXRFWHRTb2Z0d2FyZQBBZG9iZSBJbWFnZVJlYWR5ccllPAAAABZJREFUeNpi2r9//38bIxsDCAAEGAAFEgHBSXoK2AAAAABJRU5ErkJggg=='); /* Tekstur noise tipis */
        }

        
        #msgPopup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.7);
            z-index: 200;
            width: 85%;
            max-width: 320px;
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 100px;
            margin: 15px 0;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 10px;
            font-family: 'Quicksand', sans-serif;
            box-sizing: border-box;
            resize: none;
        }
    </style>
</head>
<body>

    <div id="book-wrapper">
        <div id="album">
            <div class="page"><img src="page1.png" alt="Cover"></div>
            
            <div class="page"><img src="page2.png" alt="Page 2"></div>
            <div class="page"><img src="page3.png" alt="Page 3"></div>
            
            <div class="page"><img src="page4.png" alt="Page 4"></div>
            <div class="page"><img src="page5.png" alt="Page 5"></div>
            
            <div class="page"><img src="page6.png" alt="Page 6"></div>
            <div class="page">
                <div class="last-page">
                    <h2>Thank You</h2>
                    <p style="font-size: 14px; margin-bottom: 30px;">For everything...</p>
                    <button class="btn" onclick="openPopup()">Kirim Pesan</button>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="$('#album').turn('previous')">←</button>
        <button class="btn" onclick="$('#album').turn('next')">→</button>
    </div>

    <div id="msgPopup">
        <h3>Tulis pesan untukku:</h3>
        <textarea id="pesanInput" placeholder="Halo sayang..."></textarea>
        <br>
        <button class="btn" style="margin-bottom: 10px; width: 100%;" onclick="kirimWA()">Kirim Pesan</button>
        <button class="btn" style="background: #999; width: 100%;" onclick="closePopup()">Batal</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://rawcdn.githack.com/blasten/turn.js/master/turn.min.js"></script>

    <script>
        $(document).ready(function() {
            
            $("#album").turn({
                width: 700,
                height: 500,
                autoCenter: true,
                display: 'double',
                elevation: 50,
                gradients: true,
                turnCorners: "bl,br"
            });

            
            function resizeBook() {
                var viewportWidth = $(window).width();
                var viewportHeight = $(window).height();
                
                var bookWidth = 700;
                var bookHeight = 500;

                
                var scale = Math.min((viewportWidth - 20) / bookWidth, (viewportHeight - 120) / bookHeight);
                
                $('#album').css({
                    transform: 'scale(' + scale + ')',
                    transformOrigin: 'center center'
                });
            }

            
            $(window).resize(resizeBook);
            resizeBook();
        });

        
        function openPopup() {
            document.getElementById('msgPopup').style.display = 'block';
        }

        function closePopup() {
            document.getElementById('msgPopup').style.display = 'none';
        }

        function kirimWA() {
            const pesan = document.getElementById('pesanInput').value;
            if (pesan.trim() === "") {
                alert("Jangan dikosongin ya :)");
                return;
            }
            
            const noWA = "6283114532706"; 
            const url = `https://wa.me/${noWA}?text=${encodeURIComponent(pesan)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
